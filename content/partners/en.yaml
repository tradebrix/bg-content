models:
  title: Partnership models
  cards:
    - icon: /image/partners/en/models/cards/0/icon.svg
      header: Introducing Broker (IB)
      description: >-
        For partners focused on long-term client relationships and recurring
        revenue.
      labels:
        - Revenue share structure
        - Transparent reporting
        - Scalable client management
    - icon: /image/partners/en/models/cards/1/icon.svg
      header: CPA
      description: For acquisition partners and digital marketers.
      labels:
        - Flexible CPA structures
        - Conversion-optimized funnels
        - Real-time tracking
    - icon: /image/partners/en/models/cards/2/icon.svg
      header: PAMM / MAM
      description: For experienced traders and capital managers.
      labels:
        - Automated profit distribution
        - Flexible allocation models
        - Real-time analytics and reporting
  note: >-
    Partnership structures are customized based on region, traffic profile, and
    regulatory considerations.
