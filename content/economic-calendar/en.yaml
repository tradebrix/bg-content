faq:
  title: Fequently asked questions
  questions:
    - question: What is an economic calendar?
      answer: >-
        An economic calendar lists upcoming economic data releases and events
        that can influence financial markets, such as interest rate decisions,
        employment reports, and inflation data.
    - question: How can economic events affect markets?
      answer: >-
        Economic releases can impact market sentiment and price movements,
        particularly when results differ from expectations.
    - question: How can I start trading with Blackwell?
      answer: >-
        Open a trading account, fund it using your preferred payment method, and
        access global markets through our trading platforms.
    - question: Which platforms can I trade on?
      answer: >-
        You can trade on MetaTrader 4 and MetaTrader 5, available on desktop,
        web, and mobile.
