faq:
  title: Fequently asked questions
  questions:
    - question: Are my funds separated from Blackwell’s own money?
      answer: >-
        Yes. Client funds are held in segregated accounts and are kept separate
        from Blackwell’s operational capital.
    - question: Does Blackwell use my money for trading or hedging?
      answer: >-
        No. Client funds are not used for company trading, hedging, or
        operational purposes.
    - question: What happens to my money if Blackwell stops operating?
      answer: >-
        Segregated client funds are protected from company creditors and would
        be returned to clients following applicable procedures.
    - question: Can I withdraw my funds at any time?
      answer: >-
        Withdrawals are available in line with account terms and standard
        processing times.
