seo:
  title: Trade Forex, Indices, Commodities & More | Blackwell
  description: >-
    Explore all markets with Blackwell. Trade forex, indices, commodities,
    metals, and more with competitive spreads and fast, reliable execution.
  noIndex: true
  noFollow: true
hero:
  title: Global markets. One Account.
  subtitle: Enjoy competitive pricing and high speed execution.
  primaryButtonText: Open Account
  primaryButtonLink: https://secure.blackwellglobal.bs/register/
  secondaryButtonText: Try Demo Account
  secondaryButtonLink: https://secure.blackwellglobal.bs/register/
globalMarkets:
  title: Trade across major global markets
  subtitle: Access global instruments through a single trading account.
  cards:
    - title: Forex
      description: >
        Major and minor currency pairs, traded with competitive pricing and
        stable execution.
      buttonText: See More
      icon: /image/all-markets/en/globalMarkets/cards/0/icon.svg
    - title: Indices
      description: >-
        Trade leading global indices and gain exposure to regional and
        international markets.
      buttonText: See More
      icon: /image/all-markets/en/globalMarkets/cards/1/icon.svg
    - title: Energies
      description: >
        Access key energy markets, including oil and gas, with transparent
        pricing.
      buttonText: See More
      icon: /image/all-markets/en/globalMarkets/cards/2/icon.svg
    - title: Precious Metals
      description: >-
        Trade gold, silver, and other metals as part of a diversified trading
        approach.
      buttonText: See More
      icon: /image/all-markets/en/globalMarkets/cards/3/icon.svg
    - title: Commodities
      description: Trade commodities across global markets.
      buttonText: See More
      icon: /image/all-markets/en/globalMarkets/cards/4/icon.svg
    - title: ETFs
      description: Gain exposure to themed and sector-based ETFs through a single trade.
      buttonText: See More
      icon: /image/all-markets/en/globalMarkets/cards/5/icon.svg
    - title: Equities CFDs
      description: >-
        Trade CFDs on selected global equities, with the ability to go long or
        short.
      buttonText: See More
      icon: /image/all-markets/en/globalMarkets/cards/6/icon.svg
tradeWithUs:
  title: Why trade with us?
  cards:
    - icon: /image/all-markets/en/tradeWithUs/cards/0/icon.svg
      title: Lightning-fast execution
      description: Low-latency infrastructure designed for speed, stability, and precision.
    - icon: /image/all-markets/en/tradeWithUs/cards/1/icon.svg
      title: Low spreads. Zero commissions.
      description: Competitive pricing sourced from established liquidity providers.
    - icon: /image/all-markets/en/tradeWithUs/cards/2/icon.svg
      title: 24/5 professional support
      description: Dedicated support available whenever markets are active.
    - icon: /image/all-markets/en/tradeWithUs/cards/3/icon.svg
      title: Reliable trading platforms
      description: Institutional infrastructure and execution standards you can depend on.
