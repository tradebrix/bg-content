faq:
  title: Frequently asked questions
  questions:
    - question: What is MetaTrader 5?
      answer: >-
        MetaTrader 5 is a multi-asset trading platform offering advanced
        charting, fast execution, and professional trading tools for global
        markets.
    - question: Which markets can I trade on MT5 with Blackwell?
      answer: >-
        You can trade forex, indices, commodities, precious metals, Equities
        CFDs, and more, depending on availability.
    - question: Can I use MT5 on mobile?
      answer: >-
        Yes. MT5 is available on iOS and Android with full trading
        functionality.
    - question: Can I try MT5 before trading live?
      answer: >-
        Yes. You can open a demo account to practise trading in a risk-free
        environment.
