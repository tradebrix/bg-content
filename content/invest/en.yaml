faq:
  title: Frequently asked questions
  questions:
    - question: How profitable is social trading on Blackwell Invest?
      answer: >-
        Performance depends on the strategy provider you follow, market
        conditions, and your risk settings. While some providers may deliver
        consistent results, past performance is not a guarantee of future
        returns, and losses can occur.
    - question: How does social trading work on Blackwell Invest?
      answer: >-
        Blackwell Invest allows you to automatically replicate the trades of
        selected strategy providers in real time. When a provider opens or
        closes a trade, the same action is mirrored in your account based on
        your chosen allocation.
    - question: Is Blackwell Invest suitable for beginners?
      answer: >-
        Yes. Blackwell Invest can be suitable for beginners as it enables market
        participation without active trading. However, users should understand
        the risks involved and start with appropriate exposure levels.
    - question: What risks are involved in social trading?
      answer: >-
        Social trading carries the same risks as trading, including market
        volatility, drawdowns, potential losses, over-exposure to a single
        strategy, and technical execution risks.
    - question: What risks are involved in social trading?
      answer: >-
        Social trading carries the same risks as trading, including market
        volatility, drawdowns, potential losses, over-exposure to a single
        strategy, and technical execution risks.
    - question: Can I lose money using Blackwell Invest?
      answer: >-
        Yes. Social trading does not eliminate risk. Market movements are
        unpredictable, and losses may occur even when following experienced
        strategy providers.
    - question: How do I choose a strategy to copy?
      answer: >-
        When selecting a provider, consider long-term performance, drawdown
        levels, risk profile, trading style, and consistency. Avoid relying
        solely on short-term results.
    - question: Can I stop copying a strategy at any time?
      answer: >-
        Yes. You can stop copying a strategy, close positions, or adjust your
        copy settings at any time directly within the Blackwell Invest platform.
    - question: What fees apply to Blackwell Invest social trading?
      answer: >-
        Fees may include spreads, commissions, and performance-based fees set by
        strategy providers. Fee structures vary and should be reviewed before
        copying any strategy.
