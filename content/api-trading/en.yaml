seo:
  title: 'API Trading | Blackwell '
  noIndex: false
  noFollow: false
hero:
  title: API Trading with Blackwell
  subtitle: >-
    Connect your proprietary systems, algorithms, or third-party platforms
    directly to Blackwell's pricing and execution infrastructure.
what:
  title: What is API trading?
  subtitle: >-
    API trading allows two systems to communicate directly. In a trading
    context, this means connecting your own software, algorithm, or external
    platform to Blackwell’s trading servers. 


    Instead of manually placing orders through a graphical interface,
    instructions are transmitted programmatically. This enables:
  image: /image/api-trading/en/what/image.svg
  cards:
    - icon: /image/api-trading/en/what/cards/0/icon.svg
      title: Automated execution
    - icon: /image/api-trading/en/what/cards/1/icon.svg
      title: Strategy deployment without manual intervention
    - icon: /image/api-trading/en/what/cards/2/icon.svg
      title: Direct access to live pricing
    - icon: /image/api-trading/en/what/cards/3/icon.svg
      title: Integration with custom analytics systems
  note: >-
    API trading is commonly used for algorithmic strategies, portfolio
    automation, and advanced execution workflows.
build:
  header: Build, automate, and execute through secure API connectivity.
  title: >-
    Designed for systematic traders, developers, and institutions requiring
    direct market access and execution control.
  cards:
    - icon: /image/api-trading/en/build/cards/0/icon.svg
      title: Live market data
    - icon: /image/api-trading/en/build/cards/1/icon.svg
      title: Automated order execution
    - icon: /image/api-trading/en/build/cards/2/icon.svg
      title: Institution-grade infrastructure
    - icon: /image/api-trading/en/build/cards/3/icon.svg
      title: Dedicated technical support
how:
  title: How it works
  subtitle: 'Blackwell’s API provides secure endpoints that allow your system to:'
  cards:
    - image: /image/api-trading/en/how/cards/0/image.svg
      title: Retrieve live price feeds
    - image: /image/api-trading/en/how/cards/1/image.svg
      title: Access historical market data
    - image: /image/api-trading/en/how/cards/2/image.svg
      title: Send and manage trade orders
    - image: /image/api-trading/en/how/cards/3/image.svg
      title: Monitor open positions and account balances
  containers:
    - text: >-
        Orders submitted via API are processed using the same pricing and
        execution framework available on our standard trading platforms.
    - text: >-
        Execution speed and reliability depend on system configuration,
        connectivity, and market conditions.
who:
  title: Who is API trading designed for?
  image: /image/api-trading/en/who/image.svg
  header: 'API connectivity is typically used by:'
  labels:
    - Algorithmic traders running systematic strategies
    - High-frequency and quantitative traders
    - Institutional participants
    - Developers building proprietary trading interfaces
    - Portfolio managers requiring automated allocation
  footer: >-
    API trading is suitable for clients who require control over execution logic
    and integration flexibility.
why:
  title: Why trade via API with Blackwell
  cards:
    - icon: /image/api-trading/en/why/cards/0/icon.svg
      title: Direct infrastructure access
      description: >-
        Connect directly to Blackwell's pricing and execution environment
        without intermediary interfaces.
    - icon: /image/api-trading/en/why/cards/1/icon.svg
      title: Automation capability
      description: >-
        Deploy rule-based or algorithmic strategies with consistent execution
        logic.
    - icon: /image/api-trading/en/why/cards/2/icon.svg
      title: Real-time market data
      description: >-
        Access streaming quotes and historical datasets for backtesting and
        analytics.
    - icon: /image/api-trading/en/why/cards/3/icon.svg
      title: Execution control
      description: >-
        Define order parameters programmatically, including size, timing, and
        execution instructions.
    - icon: /image/api-trading/en/why/cards/4/icon.svg
      title: Platform flexibility
      description: >-
        Integrate with proprietary systems or supported third-party
        environments.
    - icon: /image/api-trading/en/why/cards/5/icon.svg
      title: Secure connectivity
      description: >-
        Encrypted communication protocols and controlled authentication
        mechanisms.
env:
  title: Execution environment
  subtitle: >-
    API orders are processed within Blackwell’s established execution
    infrastructure.
  labels:
    - Competitive pricing across asset classes
    - Reliable order processing
    - Access to global markets
    - Structured risk and compliance oversight
  note: >-
    Execution quality remains consistent with Blackwell’s standard trading
    environment.
started:
  title: Getting started with API trading
  steps:
    - title: Open an account
      description: Open and verify a live trading account with Blackwell.
    - title: Request API access
      description: Apply for API credentials through your account manager or support team.
    - title: Generate API credentials
      description: Receive secure authentication keys and integration documentation.
    - title: Connect and test
      description: >-
        Integrate your system in a demo environment before deploying to live
        trading.
    - title: Deploy
      description: Begin automated execution under your configured strategy parameters.
  image: /image/api-trading/en/started/image.svg
