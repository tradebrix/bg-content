what:
  title: What is API trading?
  subtitle: >-
    API trading allows two systems to communicate directly. In a trading
    context, this means connecting your own software, algorithm, or external
    platform to Blackwell’s trading servers. 

     Instead of manually placing orders through a graphical interface, instructions are transmitted programmatically. This enables:
  image: /image/api-trading/en/what/image.svg
  cards:
    - icon: /image/api-trading/en/what/cards/0/icon.svg
      title: Automated execution
    - icon: /image/api-trading/en/what/cards/1/icon.svg
      title: Strategy deployment without manual intervention
    - icon: /image/api-trading/en/what/cards/2/icon.svg
      title: Direct access to live pricing
    - icon: /image/api-trading/en/what/cards/3/icon.svg
      title: Integration with custom analytics systems
  note: >-
    API trading is commonly used for algorithmic strategies, portfolio
    automation, and advanced execution workflows.
