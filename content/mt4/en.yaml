faq:
  title: Frequently asked questions
  questions:
    - question: What is MetaTrader 4?
      answer: >-
        MetaTrader 4 is a widely used trading platform focused on forex and CFD
        trading, known for its simplicity and stability.
    - question: Which markets can I trade on MT4 with Blackwell?
      answer: >-
        MT4 provides access to forex and selected CFD markets, subject to
        availability.
    - question: Can I use MT4 on mobile?
      answer: Yes. MT4 is available on both iOS and Android devices.
    - question: Can I try MT4 before trading live?
      answer: >-
        Yes. A demo account is available to practise trading in a risk-free
        environment.
