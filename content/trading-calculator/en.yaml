faq:
  title: Frequently asked questions
  questions:
    - question: What does the profit calculator show?
      answer: >-
        The profit calculator estimates potential profit or loss based on price
        movement, position size, and trade direction.
    - question: Does the profit calculator reflect live market prices?
      answer: >-
        Prices used in the calculator are indicative. Actual prices may differ
        at the time of execution.
    - question: Can the profit calculator be used for all instruments?
      answer: >-
        The profit calculator can be used across supported instruments available
        on the trading platform.
    - question: Can I use the profit calculator before opening an account?
      answer: >-
        Yes, the profit calculator can be used for reference purposes without
        opening an account.
    - question: Is the profit calculator trading advice?
      answer: >-
        No. The profit calculator is provided for informational purposes only
        and should not be considered trading advice.
    - question: How can I start trading with Blackwell?
      answer: >-
        You can start trading with Blackwell in 3 easy steps. Create your
        Blackwell account, fund your account using your preferred payment
        method, and access the trading platform.
    - question: Which platforms can I trade on?
      answer: >-
        Trading is available on MetaTrader 5 across desktop, web, and mobile
        devices.
