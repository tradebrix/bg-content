whatIs:
  title: What is commodities trading
  definition: >-
    Commodities trading allows participants to trade price movements in physical
    goods such as agricultural products, metals, and energy-related commodities.


    Commodity markets are influenced by supply and demand dynamics, weather
    conditions, geopolitical events, and global economic activity. Trading
    commodities provides exposure to real-economy assets across global markets.
