faq:
  title: Frequently asked questions
  questions:
    - question: What are commodity markets?
      answer: >-
        Commodity markets involve the trading of physical goods such as
        agricultural products, metals, and energy-related commodities.
    - question: Which commodities can I trade with Blackwell?
      answer: >-
        Blackwell offers access to a range of global commodities across
        different sectors.
    - question: How can I trade commodities with Blackwell?
      answer: >-
        To trade commodities with Blackwell, open a trading account, fund it
        using your preferred payment method, and access commodity markets
        through the trading platform.
    - question: What platforms can I trade commodities on?
      answer: >-
        Commodities trading is available on MetaTrader 5 across desktop, web,
        and mobile.
    - question: What affects commodity prices?
      answer: >-
        Commodity prices are influenced by supply and demand, weather patterns,
        geopolitical developments, and global economic conditions.
