whatIs:
  title: What is indices trading
  definition: >-
    Indices trading allows participants to trade the performance of a group of
    stocks represented by a market index, rather than individual shares.


    Indices reflect the overall performance of a specific market or sector and
    are influenced by economic data, corporate earnings, interest rates, and
    broader market sentiment. Trading indices provides exposure to the larger
    market through a single position.
