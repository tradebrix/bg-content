faq:
  title: Frequently asked questions
  questions:
    - question: What are CFD shares?
      answer: >-
        CFD shares allow traders to speculate on share price movements without
        owning the underlying stock.
    - question: Which shares can I trade with Blackwell?
      answer: >-
        Blackwell offers access to selected global equities across major
        markets.
    - question: How can I trade CFD shares with Blackwell?
      answer: >-
        To trade CFD shares with Blackwell, open a trading account, fund it, and
        access the market through the trading platform.
    - question: What platforms can I trade CFD shares on?
      answer: >-
        CFD shares trading is available on MetaTrader 4 and MetaTrader 5 across
        desktop, web, and mobile.
    - question: What affects share prices?
      answer: >-
        Share prices are influenced by company earnings, market sentiment,
        economic data, and broader market conditions.
