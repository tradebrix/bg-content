      answer: >-
        Equities CFDs allow traders to speculate on share price movements
        without owning the underlying stock.
    - question: Which equities can I trade with Blackwell?
      answer: >-
        Blackwell offers access to selected global equities across major
        markets.
    - question: How can I trade equities CFDs with Blackwell?
      answer: >-
        To trade equities CFDs with Blackwell, open a trading account, fund it,
        and access the market through the trading platform.
    - question: What platforms can I trade equities CFDs on?
      answer: >-
        Equities CFDs trading is available on MetaTrader 5 across desktop, web,
        and mobile.
    - question: What affects equity prices?
