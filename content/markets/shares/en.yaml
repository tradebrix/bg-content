whatIs:
  title: What is CFD shares trading?
  definition: >-
    CFD shares trading allows participants to trade price movements in
    individual company shares without owning the underlying equity.


    CFDs enable traders to take positions on rising or falling share prices
    across global markets, with pricing influenced by company performance,
    earnings, market conditions, and broader economic factors.
