whatIs:
  title: What is precious metals trading?
  definition: >-
    Precious metals trading allows participants to trade price movements in
    metals such as gold, silver, platinum, and palladium.


    These markets are often influenced by macroeconomic conditions, interest
    rates, inflation expectations, and geopolitical developments. Precious
    metals are commonly traded for diversification and as a way to gain exposure
    to global market sentiment.
