faq:
  title: Fequently asked questions
  questions:
    - question: What are CFD bonds?
      answer: >-
        CFD bonds allow traders to speculate on bond price movements without
        owning the underlying bond.
    - question: Which bonds can I trade with Blackwell?
      answer: >-
        Blackwell offers access to selected government and corporate bond
        markets.
    - question: How can I trade CFD bonds with Blackwell?
      answer: >-
        To trade CFD bonds with Blackwell, open a trading account, fund it, and
        access bond markets through the trading platform.
    - question: What platforms can I trade CFD bonds on?
      answer: >-
        CFD bonds trading is available on MetaTrader 4 and MetaTrader 5 across
        desktop, web, and mobile.
    - question: What affects bond prices?
      answer: >-
        Bond prices are influenced by interest rates, inflation expectations,
        central bank decisions, and economic conditions.
