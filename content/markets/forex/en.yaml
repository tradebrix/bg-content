whatIs:
  title: What is forex trading?
  definition: >-
    Forex trading involves the exchange of one currency for another, allowing
    participants to trade movements in exchange rates across global markets.


    The forex market operates continuously across major financial centres,
    making it one of the most liquid and actively traded markets in the world.
    Prices are influenced by economic data, interest rates, geopolitical
    developments, and market sentiment.
