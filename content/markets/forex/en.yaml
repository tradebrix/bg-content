faq:
  title: Frequently asked questions
  questions:
    - question: What is the forex market?
      answer: >-
        The forex market is a global, decentralised marketplace where currencies
        are traded against one another.
    - question: What platforms can I trade forex on?
      answer: >-
        Forex trading is available on MetaTrader 5 across desktop, web, and
        mobile devices.
    - question: How can I trade forex with Blackwell?
      answer: >-
        You can start trading forex in 3 easy steps. Open your Blackwell
        account, deposit using your preferred funding method, and start trading.
    - question: What currency pairs are available?
      answer: Blackwell offers 65+ major, minor, and exotic currency pairs.
    - question: What are spreads in forex trading?
      answer: >-
        The spread is the difference between the bid and ask price of a currency
        pair and represents the cost of trading. Blackwell offers ultra-tight
        spreads.
    - question: Is forex trading suitable for all investors?
      answer: >-
        Forex trading involves risk and may not be suitable for all investors.
        It is important to understand the risks before trading.
    - question: When is the forex market open?
      answer: >-
        Forex markets operate 24 hours a day during the trading week, from
        Monday to Friday.
