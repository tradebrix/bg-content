faq:
  title: Frequently asked questions
  questions:
    - question: What are ETFs?
      answer: >-
        ETFs, or exchange-traded funds, are instruments designed to track the
        performance of a group of assets such as equities, sectors, or
        commodities.
    - question: Which ETFs can I trade with Blackwell?
      answer: >-
        Blackwell offers access to a range of ETFs covering different markets,
        sectors, and themes.
    - question: How can I trade ETFs with Blackwell?
      answer: >-
        To trade ETFs with Blackwell, open a trading account, fund it using your
        preferred payment method, and access ETF markets through the trading
        platform.
    - question: What platforms can I trade ETFs on?
      answer: >-
        ETFs trading is available on MetaTrader 5 across desktop, web, and
        mobile.
    - question: What affects ETF prices?
      answer: >-
        ETF prices are influenced by the performance of the underlying assets,
        market conditions, and supply and demand.
