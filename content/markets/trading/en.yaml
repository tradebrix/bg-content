whatIs:
  title: What is ETFs trading?
  definition: >-
    ETFs trading allows participants to trade exchange-traded funds, which track
    the performance of a basket of assets such as equities, sectors,
    commodities, or indices.


    ETFs are designed to provide diversified exposure within a single instrument
    and are influenced by the performance of their underlying assets, market
    conditions, and investor demand.
