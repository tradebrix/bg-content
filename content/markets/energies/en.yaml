faq:
  title: Frequently asked questions
  questions:
    - question: What are energy markets?
      answer: >-
        Energy markets involve the trading of commodities such as crude oil and
        natural gas, which are essential to global economic activity.
    - question: Which energy instruments can I trade with Blackwell?
      answer: >-
        Blackwell offers access to a range of major energy instruments,
        including oil and gas markets.
    - question: What platforms can I trade energies on?
      answer: >-
        Energies trading is available on MetaTrader 5 across desktop, web, and
        mobile.
    - question: What affects energy prices?
      answer: >-
        Energy prices are influenced by supply and demand, geopolitical events,
        production decisions, and broader market conditions.
