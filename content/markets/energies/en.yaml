whatIs:
  title: What is energies trading?
  definition: >-
    Energies trading allows participants to trade price movements in energy
    commodities such as crude oil and natural gas.


    Energy markets are influenced by supply and demand dynamics, geopolitical
    developments, production levels, and macroeconomic conditions. Trading
    energies provides exposure to some of the most actively traded commodities
    in global markets.
